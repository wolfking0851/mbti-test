        let currentQuestion = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        function renderQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question').innerHTML = `<strong>第 ${currentQuestion + 1}/${questions.length} 题</strong><br><br>${q.text}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
            
            const optionsHtml = q.options.map((opt, i) => `
                <div class="option" onclick="selectOption(${i})">
                    <img src="${opt.image}" alt="选项${i+1}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22><rect fill=%22%23f0f0f0%22 width=%22120%22 height=%22120%22/><text fill=%22%23999%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22>图片</text></svg>'">
                    <div class="option-text">${opt.text}</div>
                </div>
            `).join('');
            document.getElementById('options').innerHTML = optionsHtml;
        }

        function selectOption(optionIndex) {
            const q = questions[currentQuestion];
            const opt = q.options[optionIndex];
            
            // 计分
            for (let dim in opt.score) {
                scores[dim] += opt.score[dim];
            }
            
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('result').style.display = 'block';
            
            const type = calculateType();
            const result = resultTypes[type];
            
            document.getElementById('result-type').textContent = type;
            document.getElementById('result-title').textContent = `「${result.title}」`;
            document.getElementById('result-desc').textContent = result.desc;
        }

        function calculateType() {
            let type = '';
            type += scores.E >= scores.I ? 'E' : 'I';
            type += scores.S >= scores.N ? 'S' : 'N';
            type += scores.T >= scores.F ? 'T' : 'F';
            type += scores.J >= scores.P ? 'J' : 'P';
            return type;
        }

        // 初始化
        renderQuestion();
