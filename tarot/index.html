<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塔罗牌测试 - 三张牌阵</title>
    <link rel="stylesheet" href="css/style_v2.css">
    <link rel="stylesheet" href="css/card.css">
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="home-page" class="page active">
            <h1>🔮 塔罗牌测试</h1>
            <p class="subtitle">探索你的过去 · 现在 · 未来</p>
            
            <div class="intro">
                <p>78 张完整塔罗牌，三张牌阵解读</p>
                <p>探索你的过去 · 现在 · 未来</p>
            </div>
            
            <button id="start-btn" class="start-btn">开始抽牌</button>
            
            <div class="disclaimer">
                <p>⚠️ 本测试仅供娱乐参考，不构成专业建议</p>
                <p>塔罗牌是一种心理探索工具，帮助您了解当下内心状态</p>
            </div>
        </div>
        
        <!-- 选牌页面（扇形排列 78 张） -->
        <div id="select-page" class="page">
            <h2>🎴 请选择三张牌</h2>
            <p class="hint">已选：<span id="selected-count">0</span>/3 张</p>
            
            <div class="fan-container" id="fan-container">
                <!-- 78 张牌背面，扇形排列 -->
            </div>
            
            <button id="confirm-select-btn" class="confirm-btn" disabled>确认选牌</button>
        </div>
        
        <!-- 翻牌页面（三张牌） -->
        <div id="flip-page" class="page">
            <h2>🔮 翻开你的牌</h2>
            <p class="hint">点击牌面翻开</p>
            
            <div class="card-container">
                <div class="card-slot" data-index="0">
                    <div class="card back" onclick="flipCard(0)">
                        <div class="card-back"></div>
                    </div>
                </div>
                <div class="card-slot" data-index="1">
                    <div class="card back" onclick="flipCard(1)">
                        <div class="card-back"></div>
                    </div>
                </div>
                <div class="card-slot" data-index="2">
                    <div class="card back" onclick="flipCard(2)">
                        <div class="card-back"></div>
                    </div>
                </div>
            </div>
            
            <div id="unlock-section" class="unlock-section" style="display:none;">
                <p class="unlock-text">🔓 查看完整解读</p>
                <button id="unlock-btn" class="unlock-btn">观看广告解锁</button>
                <button id="skip-btn" class="skip-btn">跳过（测试模式）</button>
            </div>
        </div>
        
        <!-- 解读页面 -->
        <div id="reading-page" class="page">
            <h2>🔮 你的塔罗牌解读</h2>
            
            <div class="reading-container">
                <div class="position">
                    <h3>📍 过去</h3>
                    <div class="card-display">
                        <img id="card-0-img" src="" alt="牌 1">
                        <p id="card-0-name" class="card-name"></p>
                    </div>
                    <div id="card-0-reading" class="reading-text"></div>
                </div>
                
                <div class="position">
                    <h3>📍 现在</h3>
                    <div class="card-display">
                        <img id="card-1-img" src="" alt="牌 2">
                        <p id="card-1-name" class="card-name"></p>
                    </div>
                    <div id="card-1-reading" class="reading-text"></div>
                </div>
                
                <div class="position">
                    <h3>📍 未来</h3>
                    <div class="card-display">
                        <img id="card-2-img" src="" alt="牌 3">
                        <p id="card-2-name" class="card-name"></p>
                    </div>
                    <div id="card-2-reading" class="reading-text"></div>
                </div>
                
                <div class="summary">
                    <h3>💡 综合解读</h3>
                    <div id="summary-reading" class="reading-text"></div>
                </div>
            </div>
            
            <div class="actions">
                <button id="share-btn" class="action-btn">分享结果</button>
                <button id="restart-btn" class="action-btn secondary">再抽一次</button>
            </div>
        </div>
    </div>
    
    <script src="js/draw.js"></script>
    <script src="js/interpretation.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
